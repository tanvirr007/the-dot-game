<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dot Game</title>
    <meta name="description" content="A modern Dots and Boxes game. Play against a friend or a smart AI on any device.">
    <link rel="icon" type="image/png" href="src/img/favicon.png">
    <link rel="stylesheet" href="src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="src/img/icon.png">
</head>

<body>
    <div id="app">
        <!-- Setup Menu -->
        <section id="setup-menu" class="screen">
            <div class="glass-card">
                <h1 class="title">The Dot Game</h1>
                <p class="subtitle">Classic Dots and Boxes</p>

                <div class="setup-group">
                    <label id="label-grid-size" class="setup-label">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
                        Grid Size
                    </label>
                    <div class="toggle-group">
                        <button id="size-3" class="toggle-btn active" onclick="setSize(3)">3x3</button>
                        <button id="size-4" class="toggle-btn" onclick="setSize(4)">4x4</button>
                        <button id="size-5" class="toggle-btn" onclick="setSize(5)">5x5</button>
                        <button id="size-6" class="toggle-btn" onclick="setSize(6)">6x6</button>
                    </div>
                </div>

                <div class="setup-group">
                    <label id="label-game-mode" class="setup-label">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        Game Mode
                    </label>
                    <div class="toggle-group">
                        <button id="mode-1v1" class="toggle-btn active" onclick="setMode('1v1')">1 vs 1</button>
                        <button id="mode-pvc" class="toggle-btn" onclick="setMode('pvc')">vs Computer</button>
                    </div>
                </div>

                <div id="pvc-options" class="setup-group expandable-section">
                    <div class="expandable-container">
                        <div class="expandable-content">
                            <div class="setup-subgroup">
                                <label id="label-difficulty" class="setup-label">
                                    <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                                    Difficulty
                                </label>
                                <div class="toggle-group">
                                    <button id="diff-easy" class="toggle-btn active" onclick="setDiff('easy')">Easy</button>
                                    <button id="diff-medium" class="toggle-btn" onclick="setDiff('medium')">Medium</button>
                                    <button id="diff-hard" class="toggle-btn" onclick="setDiff('hard')">Hard</button>
                                </div>
                            </div>
                            <div class="setup-subgroup">
                                <label id="label-first-move" class="setup-label">
                                    <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                                    First Move
                                </label>
                                <div class="toggle-group">
                                    <button id="start-p1" class="toggle-btn active" onclick="setStartingPlayer(1)">You</button>
                                    <button id="start-p2" class="toggle-btn" onclick="setStartingPlayer(2)">Computer</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="setup-group">
                    <label id="label-time-trial" class="setup-label">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        Time Trial
                    </label>
                    <div class="toggle-group">
                        <button id="time-off" class="toggle-btn active" onclick="setTimeTrial(false)">Off</button>
                        <button id="time-on" class="toggle-btn" onclick="setTimeTrial(true)">On</button>
                    </div>
                </div>

                <button id="start-btn" class="primary-btn">Start Game</button>
                <div class="credits">
                    Made by <a href="https://github.com/tanvirr007" target="_blank">tanvir</a>
                </div>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen hidden">
            <div class="game-header">
                <div class="scoreboard">
                    <div id="p1-score" class="score-card p1 active">
                        <span class="player-name">Player 1</span>
                        <span class="player-points">0</span>
                    </div>
                    <div class="vs-badge vs-badge-sm">VS</div>
                    <div id="p2-score" class="score-card p2">
                        <span class="player-name">Player 2</span>
                        <span class="player-points">0</span>
                    </div>
                </div>
                <!-- Timer Bar -->
                <div id="timer-container" class="hidden">
                    <div id="timer-bar"></div>
                </div>
            </div>

            <div id="board-container">
                <div id="game-board"></div>
            </div>

            <div class="hint-container hidden" id="hint-container">
                <button id="last-move-btn" class="hint-btn" aria-label="View Last Move" data-tooltip="View Last Move" data-tooltip-pos="bottom">
                    <img src="src/img/buttons/replay.png" alt="Replay">
                </button>
                <button id="hint-btn" class="hint-btn" aria-label="Hint" data-tooltip="Get a Hint" data-tooltip-pos="bottom">
                    <img src="src/img/buttons/hint.png" alt="Hint">
                </button>
                <button id="restart-btn" class="hint-btn" aria-label="Restart Game" data-tooltip="Restart Game" data-tooltip-pos="bottom">
                    <img src="src/img/buttons/restart.png" alt="Restart">
                </button>
            </div>

        </section>

        <button id="quit-btn" class="hidden" aria-label="Exit Game" data-tooltip="Quit Game" data-tooltip-pos="bottom">
            <img src="src/img/buttons/quit.png" alt="Quit">
        </button>

        <!-- Results Screen -->
        <section id="results-screen" class="screen hidden">
            <div class="glass-card">
                <h2 class="title">Game Over</h2>
                <div id="winner-announcement" class="winner-text">Player 1 Wins!</div>

                <div class="final-scores">
                    <div class="final-score-card p1">
                        <span class="final-player-name">Player 1</span>
                        <span class="final-player-points" id="final-p1-score">0</span>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="final-score-card p2">
                        <span class="final-player-name">Player 2</span>
                        <span class="final-player-points" id="final-p2-score">0</span>
                    </div>
                </div>

                <div class="button-row">
                    <button id="rematch-btn" class="primary-btn">Play Again</button>
                    <button id="new-game-btn" class="primary-btn">Main Menu</button>
                </div>
            </div>
        </section>

        <!-- Confirmation Modal -->
        <div id="quit-modal" class="modal-overlay hidden">
            <div class="modal-card glass-card">
                <h2 class="modal-title">Quit Match?</h2>
                <p class="modal-text">Are you sure?</p>
                <div class="button-row">
                    <button id="confirm-quit-btn" class="primary-btn">Yes</button>
                    <button id="cancel-quit-btn" class="primary-btn">No</button>
                </div>
            </div>
        </div>

        <!-- Restart Confirmation Modal -->
        <div id="restart-modal" class="modal-overlay hidden">
            <div class="modal-card glass-card">
                <h2 class="modal-title" style="color: var(--accent-p1)">Restart Match?</h2>
                <p class="modal-text">All progress in this round will be lost</p>
                <div class="button-row">
                    <button id="confirm-restart-btn" class="primary-btn"
                        style="border-color: rgba(56, 189, 248, 0.3); color: var(--accent-p1);">Yes</button>
                    <button id="cancel-restart-btn" class="primary-btn">No</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/ai.js"></script>
    <script src="src/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
