<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dot Game</title>
    <meta name="description" content="A modern Dots and Boxes game. Play against a friend or a smart AI on any device.">
    <link rel="icon" type="image/png" href="src/img/favicon.png">
    <link rel="stylesheet" href="src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="src/img/icon.png">
</head>

<body>
    <div id="app">
        <!-- Setup Menu -->
        <section id="setup-menu" class="screen">
            <div class="glass-card">
                <h1 class="title">The Dot Game</h1>
                <p class="subtitle">Classic Dots and Boxes</p>

                <div class="setup-group">
                    <label>Grid Size</label>
                    <div class="toggle-group">
                        <button id="size-3" class="toggle-btn active" onclick="setSize(3)">3x3</button>
                        <button id="size-4" class="toggle-btn" onclick="setSize(4)">4x4</button>
                        <button id="size-5" class="toggle-btn" onclick="setSize(5)">5x5</button>
                        <button id="size-6" class="toggle-btn" onclick="setSize(6)">6x6</button>
                    </div>
                </div>

                <div class="setup-group">
                    <label>Game Mode</label>
                    <div class="toggle-group">
                        <button id="mode-1v1" class="toggle-btn active" onclick="setMode('1v1')">1 vs 1</button>
                        <button id="mode-pvc" class="toggle-btn" onclick="setMode('pvc')">vs Computer</button>
                    </div>
                </div>

                <div id="pvc-options" class="setup-group hidden">
                    <div class="setup-subgroup">
                        <label>Difficulty</label>
                        <div class="toggle-group">
                            <button id="diff-easy" class="toggle-btn active" onclick="setDiff('easy')">Easy</button>
                            <button id="diff-medium" class="toggle-btn" onclick="setDiff('medium')">Medium</button>
                            <button id="diff-hard" class="toggle-btn" onclick="setDiff('hard')">Hard</button>
                        </div>
                    </div>
                    <div class="setup-subgroup">
                        <label>First Move</label>
                        <div class="toggle-group">
                            <button id="start-p1" class="toggle-btn active" onclick="setStartingPlayer(1)">You</button>
                            <button id="start-p2" class="toggle-btn" onclick="setStartingPlayer(2)">Computer</button>
                        </div>
                    </div>
                </div>

                <button id="start-btn" class="primary-btn">Start Game</button>
                <div class="credits">
                    Made by <a href="https://github.com/tanvirr007" target="_blank">tanvir</a>
                </div>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen hidden">
            <div class="game-header">
                <div class="scoreboard">
                    <div id="p1-score" class="score-card p1 active">
                        <span class="player-name">Player 1</span>
                        <span class="player-points">0</span>
                    </div>
                    <div class="vs-badge vs-badge-sm">VS</div>
                    <div id="p2-score" class="score-card p2">
                        <span class="player-name">Player 2</span>
                        <span class="player-points">0</span>
                    </div>
                </div>
            </div>

            <div id="board-container">
                <div id="game-board"></div>
            </div>

            <div class="hint-container hidden" id="hint-container">
                <button id="last-move-btn" class="hint-btn" aria-label="View Last Move">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M247.31,124.76c-.35-.79-8.82-19.74-27.65-38.58C194.57,61,162.88,48,128,48S61.43,61,36.34,86.18C17.51,105,9,124,8.69,124.76a8,8,0,0,0,0,6.48c.35.79,8.82,19.74,27.65,38.58C61.43,195,93.12,208,128,208s66.57-13,91.66-38.18c18.83-18.84,27.3-37.79,27.65-38.58A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128a133.33,133.33,0,0,1,23.07-30.75C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.47,133.47,0,0,1,231,128a133.33,133.33,0,0,1-23.07,30.75C185.67,180.81,158.78,192,128,192Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"></path></svg>
                </button>
                <button id="hint-btn" class="hint-btn" aria-label="Hint">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
                </button>
            </div>

        </section>

        <button id="quit-btn" class="hidden" aria-label="Exit Game">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256">
                <path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"></path>
            </svg>
        </button>

        <!-- Results Screen -->
        <section id="results-screen" class="screen hidden">
            <div class="glass-card">
                <h2 class="title">Game Over</h2>
                <div id="winner-announcement" class="winner-text">Player 1 Wins!</div>

                <div class="final-scores">
                    <div class="final-score-card p1">
                        <span class="final-player-name">Player 1</span>
                        <span class="final-player-points" id="final-p1-score">0</span>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="final-score-card p2">
                        <span class="final-player-name">Player 2</span>
                        <span class="final-player-points" id="final-p2-score">0</span>
                    </div>
                </div>

                <div class="button-row">
                    <button id="rematch-btn" class="primary-btn">Play Again</button>
                    <button id="new-game-btn" class="primary-btn">Main Menu</button>
                </div>
            </div>
        </section>

        <!-- Confirmation Modal -->
        <div id="quit-modal" class="modal-overlay hidden">
            <div class="modal-card glass-card">
                <h2 class="modal-title">Quit Match?</h2>
                <p class="modal-text">Are you sure?</p>
                <div class="button-row">
                    <button id="confirm-quit-btn" class="primary-btn">Yes</button>
                    <button id="cancel-quit-btn" class="primary-btn">No</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/ai.js"></script>
    <script src="src/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
